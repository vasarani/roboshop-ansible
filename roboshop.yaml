- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars: 
     sg_id: sg-0f99207bb9a2cd68c
     ami_id: ami-0220d79f3f480ecf5
     env: dev 
     instances: 
       - mongodb
       - Catalogue
  tasks: 
    - name: create ec2 instance
      amazon.aws.ec2_instance:
         instance_type: "t3.micro"
         security_group: "{{ sg_id }}"
         image_id: "{{ ami_id }}"
         name: "{{ item }}-{{ env }}"
         tags: 
           Project: roboshop
           Component: "{{ item }}"
           Environment: "{{ env }}"
           Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      register: ec2_outputs

    - name: print output
      ansible.builtin.debug:
        msg: "{{ ec2_outputs }}"   