- name: create ec2 and r53 records
  hosts: all
  connection: local
  vars: 
     sg_id: sg-0f99207bb9a2cd68c
     ami_id: ami-0220d79f3f480ecf5
     domain_name: rawsd.in 
     env: dev 
     action: create
     instances: 
       - mongodb
       - Catalogue
  tasks: 
    - name: create ec2 instance
      amazon.aws.ec2_instance:
         instance_type: "t3.micro"
         security_group: "{{ sg_id }}"
         image_id: "{{ ami_id }}"
         name: "{{ item }}-{{ env }}"
         tags: 
           Project: roboshop
           Component: "{{ item }}"
           Environment: "{{ env }}"
           Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      register: ec2_outputs
      when: action == "create"

    - name: print output
      ansible.builtin.debug:
        msg: "{{ ec2_outputs }}"
      when: action == "create"  

    - name: create route53 records
      amazon.aws.route53:
        state: present
        zone: "{{domain_name}}"
        record: "{{ item.item }}-{{env}}.{{domain_name}}" #mongodb-dev-rawsd.in
        type: A 
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}" 
        wait: true
        overwrite: true
      loop: "{{ec2_outputs.results}}" 
      when: action == "create"

    - name: create r53 for frontend
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "roboshop-{{env}}.{{domain_name}}"
        type: A 
        ttl: 1 
        value: "{{item.instances[0].public_ip_address}}"
        wait: true
        overwrite: true
      loop: "{{ec2_outputs.results}}"
      when: # and 
        - item.item == "frontend"  
        - action == "create"

    - name: delete route53 record
      amazon.aws.route53:
        state: absent
        zone: "{{domain_name}}"
        record: "{{ item }}-{{env}}.{{domain_name}}" #mongodb-dev-rawsd.in
        type: A 
        ttl: 1
      loop: "{{ instances }}"  
      when: action == "destroy"

    - name: delete ec2-instance
      amazon.aws.ec2_instance:
        state: absent
        name: "{{ item }}-{{ env }}"
        wait: false
      loop: "{{ instances }}"
      when: action == "destroy"
     
